version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: delivery_db
    ports:
      - "5433:5432"

  notification-service:
    build: .
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://admin:1234@postgres:5432/delivery_db
    depends_on:
      - postgres
